<script>
/*
 * Shanaya — MKOV Travel Assistant
 * WordPress Footer Embed v8
 *
 * Includes:
 * 1. Chat launcher + iframe (desktop + mobile)
 * 2. NEW — Mobile-only side "Talk to an Expert" button that
 *    opens WhatsApp directly to +91 8010700700
 */
(function () {

  var RENDER      = 'https://arya-v1-0-0.onrender.com';
  var WHATSAPP_NUM = '918010700700';

  /* ── Chatbot iframe ── */
  var iframe = document.createElement('iframe');
  iframe.src   = RENDER + '/widget';
  iframe.id    = 'shanaya-iframe';
  iframe.title = 'Shanaya — MKOV Travel Assistant';
  iframe.setAttribute('allow', 'microphone');
  iframe.style.cssText = 'position:fixed;bottom:0;right:0;width:0;height:0;border:none;z-index:99998;pointer-events:none;background:transparent;';
  document.body.appendChild(iframe);

  /* ── Styles ── */
  var style = document.createElement('style');
  style.textContent = [
    '#sh-btn{position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#0d3055,#1a5a8a);color:#fff;border:none;border-radius:32px;padding:10px 18px 10px 10px;cursor:pointer;box-shadow:0 8px 28px rgba(13,48,85,.35);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;transition:transform .2s,box-shadow .2s;user-select:none;}',
    '#sh-btn:hover{transform:translateY(-3px);}',
    '.sh-av{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.3);flex-shrink:0;position:relative;background:#2678b5;display:flex;align-items:center;justify-content:center;}',
    '.sh-av img{width:100%;height:100%;object-fit:cover;display:none;}',
    '.sh-fb{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#fff;}',
    '.sh-pulse{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:#4ade80;border-radius:50%;border:2px solid #fff;animation:shp 2.5s ease-in-out infinite;}',
    '@keyframes shp{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.5}}',
    '.sh-txt{display:flex;flex-direction:column;line-height:1.2;text-align:left;}',
    '.sh-txt strong{font-size:13.5px;font-weight:500;}',
    '.sh-txt span{font-size:10.5px;opacity:.72;font-weight:300;}',
    '@media(max-width:520px){#sh-btn{right:12px;bottom:12px;padding:9px 14px 9px 9px;}#sh-btn .sh-txt span{display:none;}}',
    /* Mobile-only "Talk to an Expert" side tab */
    '#sh-expert-tab{',
      'display:none;',                 /* hidden by default — shown only on mobile via media query below */
      'position:fixed;',
      'right:0;',
      'top:50%;',
      'transform:translateY(-50%) rotate(-90deg);',
      'transform-origin:right center;',
      'background:#25D366;',           /* WhatsApp green */
      'color:#fff;',
      'padding:9px 16px;',
      'border-radius:8px 8px 0 0;',
      'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;',
      'font-size:12.5px;',
      'font-weight:600;',
      'letter-spacing:.02em;',
      'text-decoration:none;',
      'z-index:99997;',
      'box-shadow:0 2px 10px rgba(0,0,0,.25);',
      'display:flex;',
      'align-items:center;',
      'gap:6px;',
      'white-space:nowrap;',
    '}',
    '@media(max-width:768px){',
      '#sh-expert-tab{display:flex !important;}',
    '}',
    '#sh-expert-tab svg{width:14px;height:14px;fill:#fff;transform:rotate(90deg);flex-shrink:0;}',
  ].join('');
  document.head.appendChild(style);

  /* ── Chat launcher button ── */
  var btn = document.createElement('button');
  btn.id = 'sh-btn';
  btn.setAttribute('aria-label','Chat with Shanaya — MKOV Travel Assistant');
  btn.innerHTML = [
    '<div class="sh-av">',
      '<img src="'+RENDER+'/static/Shanaya-avatar.jpg" onload="this.style.display=\'block\';this.nextSibling.style.display=\'none\'" onerror="this.style.display=\'none\'" alt="">',
      '<span class="sh-fb">S</span>',
      '<div class="sh-pulse"></div>',
    '</div>',
    '<div class="sh-txt"><strong>Chat with Shanaya</strong><span>MKOV Travel Assistant</span></div>',
  ].join('');
  document.body.appendChild(btn);

  /* ── NEW: Mobile-only "Talk to an Expert" WhatsApp tab ── */
  var expertTab = document.createElement('a');
  expertTab.id = 'sh-expert-tab';
  expertTab.href = 'https://wa.me/' + WHATSAPP_NUM + '?text=' + encodeURIComponent('Hi, I need help planning my trip with Uniglobe MKOV Travel.');
  expertTab.target = '_blank';
  expertTab.rel = 'noopener noreferrer';
  expertTab.innerHTML = [
    '<svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.79 14.07c-.24.68-1.4 1.3-1.93 1.35-.51.05-.98.24-3.28-.68-2.78-1.11-4.56-3.94-4.7-4.12-.14-.18-1.12-1.49-1.12-2.85 0-1.35.71-2.02.96-2.29.24-.27.53-.34.71-.34.18 0 .35 0 .5.01.16.01.38-.06.6.46.24.57.81 1.99.88 2.13.07.15.12.32.02.5-.1.19-.15.3-.29.46-.15.16-.31.36-.44.48-.15.14-.3.29-.13.57.17.28.75 1.23 1.6 1.99 1.1.98 2.03 1.28 2.31 1.43.28.14.44.12.61-.07.16-.19.68-.79.86-1.06.18-.27.36-.22.6-.13.24.09 1.53.72 1.79.85.27.14.44.2.51.31.07.11.07.65-.17 1.33z"/></svg>',
    '<span>Talk to an Expert</span>',
  ].join('');
  document.body.appendChild(expertTab);

  function _sz(){ return window.innerWidth<=520?{w:'100vw',h:'92vh'}:{w:'420px',h:'650px'}; }

  var isOpen = false;

  function openChat(){
    if (isOpen) return;
    isOpen = true;
    var sz = _sz();
    iframe.style.width=''; iframe.style.height='';
    iframe.style.width         = sz.w;
    iframe.style.height        = sz.h;
    iframe.style.pointerEvents = 'all';
    btn.style.display          = 'none';
    setTimeout(function(){
      try { iframe.contentWindow.postMessage({action:'open_shanaya'},'*'); } catch(e){}
    }, 200);
  }

  function closeChat(){
    isOpen = false;
    iframe.style.width='0'; iframe.style.height='0';
    iframe.style.pointerEvents='none'; btn.style.display='flex';
  }

  function minimiseChat(){
    isOpen = false;
    iframe.style.width='0'; iframe.style.height='0';
    iframe.style.pointerEvents='none'; btn.style.display='flex';
  }

  btn.addEventListener('click', openChat);

  window.addEventListener('message', function(e){
    if (!e.data) return;
    if (e.data.action==='close_shanaya')    closeChat();
    if (e.data.action==='minimise_shanaya') minimiseChat();
    if (e.data.action==='expand_shanaya'){
      if (!isOpen){
        isOpen=true;
        var sz=_sz();
        iframe.style.width=sz.w; iframe.style.height=sz.h;
        iframe.style.pointerEvents='all'; btn.style.display='none';
      }
    }
  });

  window.addEventListener('resize',function(){
    if (!isOpen) return;
    var sz=_sz(); iframe.style.width=sz.w; iframe.style.height=sz.h;
  });

})();
</script>
