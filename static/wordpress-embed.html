<script>
(function() {
  // Create container for iframe
  var container = document.createElement('div');
  container.id = 'umkov-chat-container';
  container.style.cssText = [
    'position:fixed',
    'right:20px',
    'bottom:20px',
    'width:460px',
    'height:700px',
    'border:none',
    'border-radius:12px',
    'z-index:999999',
    'box-shadow:0 10px 40px rgba(0,0,0,0.2)',
    'display:block',
    'background:white',
  ].join(';');

  // Create iframe
  var iframe = document.createElement('iframe');
  iframe.src = 'https://arya-v1-0-0.onrender.com/widget';
  iframe.id = 'umkov-chat-iframe';
  iframe.style.cssText = [
    'width:100%',
    'height:100%',
    'border:none',
    'border-radius:12px',
    'background:transparent',
  ].join(';');
  iframe.setAttribute('allow', 'microphone');
  iframe.setAttribute('title', 'UMKOV — Travel Assistant');
  
  // Append iframe to container
  container.appendChild(iframe);
  
  // Append container to body when DOM is ready
  if (document.body) {
    document.body.appendChild(container);
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.appendChild(container);
    });
  }

  // Handle close message from iframe
  window.addEventListener('message', function(event) {
    if (event.data && event.data.action === 'close') {
      var container = document.getElementById('umkov-chat-container');
      if (container) {
        container.style.display = 'none';
      }
    }
  });

  // Optional: Re-show chat with button click
  window.umkovShowChat = function() {
    var container = document.getElementById('umkov-chat-container');
    if (container) {
      container.style.display = 'block';
    }
  };

  window.umkovHideChat = function() {
    var container = document.getElementById('umkov-chat-container');
    if (container) {
      container.style.display = 'none';
    }
  };
})();
</script>
