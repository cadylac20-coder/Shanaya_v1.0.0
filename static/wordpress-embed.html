<script>
(function () {

  // Wait for the iframe the footer script creates
  function init() {
    var iframe = document.getElementById('mkov-arya-iframe');
    if (!iframe) {
      // Footer script hasn't run yet — wait 100ms and retry
      setTimeout(init, 100);
      return;
    }

    // ── Hide iframe by default ─────────────────────────────────────────
    iframe.style.display = 'none';

    // ── Create launcher button ─────────────────────────────────────────
    var btn = document.createElement('button');
    btn.id = 'umkov-launcher';
    btn.innerHTML = [
      '<div id="umkov-av">',
        'U',
        '<span id="umkov-pulse"></span>',
      '</div>',
      '<div id="umkov-txt">',
        '<strong>Chat with UMKOV</strong>',
        '<span>MKOV Travel Assistant</span>',
      '</div>'
    ].join('');

    // ── Launcher styles ────────────────────────────────────────────────
    var style = document.createElement('style');
    style.textContent = [
      '#umkov-launcher{',
        'position:fixed;bottom:24px;right:24px;z-index:999998;',
        'display:flex;align-items:center;gap:10px;',
        'background:linear-gradient(135deg,#0d3055,#1a5a8a);',
        'color:#fff;border:none;border-radius:32px;',
        'padding:13px 20px 13px 14px;cursor:pointer;',
        'box-shadow:0 8px 32px rgba(13,48,85,.28);',
        'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;',
        'font-size:14px;font-weight:500;',
        'transition:transform .2s,box-shadow .2s;',
        'user-select:none;',
      '}',
      '#umkov-launcher:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(13,48,85,.38);}',
      '#umkov-av{',
        'width:34px;height:34px;border-radius:50%;',
        'background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);',
        'display:flex;align-items:center;justify-content:center;',
        'font-size:16px;font-weight:600;flex-shrink:0;position:relative;',
      '}',
      '#umkov-pulse{',
        'position:absolute;top:-1px;right:-1px;',
        'width:9px;height:9px;background:#4ade80;',
        'border-radius:50%;border:1.5px solid #fff;',
        'animation:umkov-p 2.5s ease-in-out infinite;',
      '}',
      '@keyframes umkov-p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}',
      '#umkov-txt{display:flex;flex-direction:column;line-height:1.25;text-align:left;}',
      '#umkov-txt strong{font-size:13.5px;font-weight:500;}',
      '#umkov-txt span{font-size:11px;opacity:.75;font-weight:300;}',
      '@media(max-width:480px){',
        '#umkov-launcher{right:12px;bottom:12px;padding:11px 16px 11px 12px;}',
      '}'
    ].join('');
    document.head.appendChild(style);

    // ── Toggle open/close ──────────────────────────────────────────────
    var isOpen = false;

    function openChat() {
      isOpen = true;
      iframe.style.display = 'block';
      btn.style.display = 'none';
    }

    function closeChat() {
      isOpen = false;
      iframe.style.display = 'none';
      btn.style.display = 'flex';
    }

    btn.addEventListener('click', openChat);

    // Listen for close message from widget.html inside the iframe
    window.addEventListener('message', function (e) {
      if (e.data && e.data.action === 'close_umkov') {
        closeChat();
      }
    });

    document.body.appendChild(btn);
  }

  // Start after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
