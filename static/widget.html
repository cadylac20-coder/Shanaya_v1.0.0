<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shanaya — MKOV Travel Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d3055;--navy-mid:#1a5a8a;--navy-lt:#2678b5;
  --teal:#0ab5a4;--white:#fff;--off:#f6f8fb;
  --border:rgba(13,48,85,.12);--text:#1a2b3c;--muted:#6b7f8f;--lt:#9bb0c1;
  --sh-sm:0 2px 12px rgba(13,48,85,.10);--sh-lg:0 20px 60px rgba(13,48,85,.22);
  --r:16px;--r-sm:10px;--ease:.22s cubic-bezier(.4,0,.2,1);
  --ww:370px;--wh:560px;
}
body{background:transparent;font-family:'DM Sans',sans-serif;overflow:hidden;}
#Shanaya-launcher{position:fixed;bottom:24px;right:24px;z-index:9998;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:var(--white);border:none;border-radius:32px;padding:10px 18px 10px 10px;cursor:pointer;box-shadow:0 8px 28px rgba(13,48,85,.30);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;transition:transform var(--ease),box-shadow var(--ease);user-select:none;}
#Shanaya-launcher:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(13,48,85,.38);}
.lnch-av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.3);flex-shrink:0;position:relative;background:var(--navy-lt);display:flex;align-items:center;justify-content:center;}
.lnch-av img{width:100%;height:100%;object-fit:cover;display:none;}
.lnch-pulse{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#4ade80;border-radius:50%;border:2px solid var(--white);animation:pdot 2.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.lnch-text{display:flex;flex-direction:column;line-height:1.2;}
.lnch-text strong{font-size:13.5px;font-weight:500;}
.lnch-text span{font-size:10.5px;opacity:.72;font-weight:300;}
#Shanaya-widget{position:fixed;bottom:88px;right:24px;z-index:9999;width:var(--ww);height:var(--wh);border-radius:var(--r);overflow:hidden;background:var(--white);box-shadow:var(--sh-lg);display:flex;flex-direction:column;border:1px solid var(--border);transform:scale(.9) translateY(20px);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .22s ease;}
#Shanaya-widget.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
@media(max-width:480px){#Shanaya-widget{width:calc(100vw - 12px);height:85vh;right:6px;bottom:80px;}#Shanaya-launcher{right:12px;bottom:12px;}}
.s-hdr{background:linear-gradient(135deg,var(--navy) 0%,#1a5a8a 60%,#1d6fa8 100%);padding:13px 15px 12px;display:flex;align-items:center;gap:11px;flex-shrink:0;position:relative;overflow:hidden;}
.s-hdr::before{content:'';position:absolute;right:-18px;top:-18px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.04);}
.h-av{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(255,255,255,.3);flex-shrink:0;z-index:1;background:var(--navy-lt);display:flex;align-items:center;justify-content:center;}
.h-av img{width:100%;height:100%;object-fit:cover;display:none;}
.h-av-fb{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--white);}
.h-info{flex:1;z-index:1;}
.h-name{font-family:'Cormorant Garamond',serif;color:var(--white);font-size:16px;font-weight:600;line-height:1.2;letter-spacing:.02em;}
.h-sub{color:rgba(255,255,255,.58);font-size:10px;font-weight:300;letter-spacing:.04em;text-transform:uppercase;margin-top:1px;}
.h-online{display:flex;align-items:center;gap:4px;margin-top:3px;}
.h-online::before{content:'';width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pdot 2.5s infinite;}
.h-online span{font-size:10px;color:rgba(255,255,255,.52);}
.h-btns{display:flex;gap:5px;z-index:1;}
.h-btn{width:27px;height:27px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.12);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;transition:background var(--ease);}
.h-btn:hover{background:rgba(255,255,255,.24);}
.v-sw{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.v-tab{flex:1;padding:9px;text-align:center;font-size:11.5px;font-weight:500;color:var(--muted);border:none;background:var(--white);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--ease);}
.v-tab.active{color:var(--navy-mid);border-bottom-color:var(--navy-mid);}
.v-tab:hover:not(.active){background:var(--off);}
.view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.view.active{display:flex;}
#messages{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px;background:var(--off);scroll-behavior:smooth;}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:#c8d5e0;border-radius:2px;}
.msg-row{display:flex;align-items:flex-end;gap:7px;animation:mpop .22s ease;}
@keyframes mpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse;}
.msg-av{width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--navy-lt);display:flex;align-items:center;justify-content:center;}
.msg-av img{width:100%;height:100%;object-fit:cover;display:none;}
.msg-av.user-av{background:var(--teal);font-size:11px;font-weight:600;color:var(--white);}
.msg-bubble{max-width:79%;padding:9px 12px;border-radius:15px;font-size:13px;line-height:1.62;word-break:break-word;}
.msg-row.bot .msg-bubble{background:var(--white);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);box-shadow:var(--sh-sm);}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--navy-mid),var(--navy-lt));border-bottom-right-radius:4px;color:var(--white);}
.msg-bubble a{color:var(--teal);text-decoration:underline;}
.msg-row.user .msg-bubble a{color:#a8e6ff;}
.msg-time{font-size:10px;color:var(--lt);margin-top:2px;}
.msg-row.user .msg-time{text-align:right;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0;}
.typing-dots span{width:5px;height:5px;background:var(--lt);border-radius:50%;animation:bnc 1.3s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;padding:0 13px 9px;flex-shrink:0;}
.chip{padding:5px 11px;border:1px solid var(--navy-mid);border-radius:20px;font-size:11.5px;color:var(--navy-mid);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all var(--ease);white-space:nowrap;}
.chip:hover{background:var(--navy-mid);color:var(--white);}
.input-row{display:flex;gap:7px;align-items:center;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--white);}
#chat-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:12.5px;font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);outline:none;transition:border-color var(--ease);}
#chat-input:focus{border-color:var(--navy-mid);background:var(--white);}
#chat-input::placeholder{color:var(--lt);}
.send-btn{width:33px;height:33px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--navy-mid),var(--navy-lt));display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--ease),opacity var(--ease);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:disabled{opacity:.45;cursor:default;transform:none;}
.send-btn svg{width:14px;height:14px;fill:var(--white);}
</style>
</head>
<body>

<button id="Shanaya-launcher" onclick="openPanel()" aria-label="Chat with Shanaya">
  <div class="lnch-av">
    <img src="https://arya-v1-0-0.onrender.com/static/Shanaya-avatar.jpg"
         onload="this.style.display='block';this.parentElement.querySelector('span').style.display='none'"
         onerror="this.style.display='none'" alt="Shanaya">
    <span style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#fff">S</span>
    <div class="lnch-pulse"></div>
  </div>
  <div class="lnch-text">
    <strong>Chat with Shanaya</strong>
    <span>MKOV Travel Assistant</span>
  </div>
</button>

<div id="Shanaya-widget" role="dialog" aria-label="Shanaya Travel Chatbot">
  <div class="s-hdr">
    <div class="h-av">
      <img src="https://arya-v1-0-0.onrender.com/static/Shanaya-avatar.jpg"
           onload="this.style.display='block';this.parentElement.querySelector('.h-av-fb').style.display='none'"
           onerror="this.style.display='none'" alt="Shanaya">
      <span class="h-av-fb">S</span>
    </div>
    <div class="h-info">
      <div class="h-name">Shanaya</div>
      <div class="h-online"><span>Online 24 / 7</span></div>
      <div class="h-sub">Uniglobe MKOV Travel</div>
    </div>
    <div class="h-btns">
      <button class="h-btn" onclick="minimiseWidget()" title="Minimise" aria-label="Minimise">&#8722;</button>
      <button class="h-btn" onclick="closeAndClear()" title="Close and clear chat" aria-label="Close">&#x2715;</button>
    </div>
  </div>

  <div class="view active" id="chat-view">
    <div id="messages"></div>
    <div class="chip-row" id="chip-row"></div>
    <div class="input-row">
      <input id="chat-input" type="text" placeholder="Type here…"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
      <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API    = 'https://arya-v1-0-0.onrender.com';
const AVATAR = API + '/static/Shanaya-avatar.jpg';
const SK='shanaya_sid', HK='shanaya_history', IK='shanaya_id', NK='shanaya_name', PK='shanaya_phone';

function _ls(key){ try{return localStorage.getItem(key);}catch(e){return null;} }
function _lsSet(key,val){ try{localStorage.setItem(key,val);}catch(e){} }
function _lsDel(key){ try{localStorage.removeItem(key);}catch(e){} }

let sessionId     = _ls(SK) || ('web-'+Math.random().toString(36).substr(2,10));
let identityGiven = _ls(IK) === '1';
let storedName    = _ls(NK) || null;
let chatHistory   = JSON.parse(_ls(HK)||'[]');
let isTyping      = false;
_lsSet(SK, sessionId);

window.addEventListener('load', function() {
  if (window.parent !== window) {
    document.getElementById('Shanaya-launcher').style.display = 'none';
  }

  const msgs = document.getElementById('messages');

  if (chatHistory.length > 0) {
    chatHistory.forEach(function(m){
      if (m.role === 'bot') _renderBot(m.text);
      else _renderUser(m.text);
    });
    if (identityGiven) {
      document.getElementById('chat-input').placeholder = 'Ask about trips, flights, visas…';
    }
    /*
     * FIX: after restoring history (e.g. after a link click navigated
     * the page and the widget reloaded), scroll to the BOTTOM so the
     * conversation resumes where it left off, not at the very top.
     */
    requestAnimationFrame(function() {
      msgs.scrollTop = msgs.scrollHeight;
    });
  } else {
    if (identityGiven && storedName) {
      setTimeout(function(){
        var first = storedName.split(' ')[0];
        appendBot('Welcome back, ' + first + '! 🙏 Great to have you here again.\\n\\nWhat trip are we planning today?');
        document.getElementById('chat-input').placeholder = 'Ask about trips, flights, visas…';
        setChips(['All trips 🌍','Honeymoon 💑','Cheapest flights ✈️','Talk to agent 📞']);
      }, 400);
    } else {
      setTimeout(showWelcome, 400);
    }
  }

  if (window.parent !== window) openPanel();
});

window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.action === 'open_shanaya') openPanel();
});

function showWelcome() {
  appendBot(
    'Hi there! 👋 Before we can continue, I need TWO things from you, sent together in ONE message:\\n\\n' +
    '1️⃣ Your full name\\n' +
    '2️⃣ Your phone number — exactly 10 digits, numbers only (no +91, no spaces, no dashes)\\n\\n' +
    '**Example — copy this format exactly:**\\n' +
    'Rahul Sharma 9876543210'
  );
  document.getElementById('chat-input').placeholder = 'Your name and 10-digit number';
}

function openPanel() {
  document.getElementById('Shanaya-widget').classList.add('open');
  document.getElementById('Shanaya-launcher').style.display = 'none';
  setTimeout(function(){ document.getElementById('chat-input').focus(); }, 300);
  if (window.parent !== window) {
    window.parent.postMessage({ action: 'expand_shanaya' }, '*');
  }
}

function minimiseWidget() {
  document.getElementById('Shanaya-widget').classList.remove('open');
  document.getElementById('Shanaya-launcher').style.display = 'flex';
  if (window.parent !== window) {
    window.parent.postMessage({ action: 'minimise_shanaya' }, '*');
  }
}

function closeAndClear() {
  document.getElementById('Shanaya-widget').classList.remove('open');
  document.getElementById('Shanaya-launcher').style.display = 'flex';
  _lsDel(SK); _lsDel(HK);
  sessionId    = 'web-' + Math.random().toString(36).substr(2,10);
  chatHistory  = [];
  _lsSet(SK, sessionId);
  document.getElementById('messages').innerHTML = '';
  document.getElementById('chip-row').innerHTML = '';
  if (identityGiven && storedName) {
    document.getElementById('chat-input').placeholder = 'Ask about trips, flights, visas…';
    setTimeout(function(){
      var first = storedName.split(' ')[0];
      appendBot('Hi ' + first + '! 👋 Starting a fresh chat. What can I help you with today?');
      setChips(['All trips 🌍','Honeymoon 💑','Cheapest flights ✈️','Talk to agent 📞']);
    }, 300);
  } else {
    document.getElementById('chat-input').placeholder = 'Your name and 10-digit number';
    setTimeout(showWelcome, 300);
  }
  if (window.parent !== window) {
    window.parent.postMessage({ action: 'close_shanaya' }, '*');
  }
}

async function sendMessage() {
  var input = document.getElementById('chat-input');
  var text  = input.value.trim();
  if (!text || isTyping) return;
  input.value = ''; clearChips(); appendUser(text); showTyping();
  try {
    var res = await fetch(API+'/widget/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId})
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    hideTyping();
    appendBot(data.reply);
    if (data.session_id) { sessionId = data.session_id; _lsSet(SK, sessionId); }
    if (data.identity_given && !identityGiven) {
      identityGiven = true;
      _lsSet(IK, '1');
      if (data.extracted_data && data.extracted_data.contact_name) {
        storedName = data.extracted_data.contact_name;
        _lsSet(NK, storedName);
      }
      if (data.extracted_data && data.extracted_data.contact_phone) {
        _lsSet(PK, data.extracted_data.contact_phone);
      }
      document.getElementById('chat-input').placeholder = 'Ask about trips, flights, visas…';
    }
    if (data.suggested_actions && data.suggested_actions.length) {
      setChips(data.suggested_actions.slice(0,3).map(function(a){return a.label;}));
    } else if (identityGiven) {
      setChips(['All trips 🌍','Honeymoon 💑','Cheapest flights ✈️','Talk to agent 📞']);
    }
  } catch(err) {
    hideTyping();
    appendBot('I\\'m having a brief connection issue. 🙏\\nPlease try again or call **+91 8010700700**.');
  }
}

function sendChip(l) { document.getElementById('chat-input').value = l; sendMessage(); }

function _save(role, text) {
  chatHistory.push({role:role, text:text});
  if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
  _lsSet(HK, JSON.stringify(chatHistory));
}

function _botRow(html) {
  var now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  var row = document.createElement('div'); row.className = 'msg-row bot';
  row.innerHTML =
    '<div class="msg-av"><img src="'+AVATAR+'" onload="this.style.display=\\'block\\'" onerror="this.style.display=\\'none\\'" alt="S"><span style="font-family:serif;font-size:11px;font-weight:600;color:#fff">S</span></div>'+
    '<div><div class="msg-bubble">'+html+'</div><div class="msg-time">'+now+'</div></div>';
  return row;
}
function appendBot(text) {
  isTyping=false; document.getElementById('send-btn').disabled=false;
  var msgs=document.getElementById('messages');
  msgs.appendChild(_botRow(fmt(text))); msgs.scrollTop=msgs.scrollHeight; _save('bot',text);
}
function _renderBot(text) { document.getElementById('messages').appendChild(_botRow(fmt(text))); }

function appendUser(text) {
  var msgs=document.getElementById('messages');
  var now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  var row=document.createElement('div'); row.className='msg-row user';
  row.innerHTML='<div><div class="msg-bubble">'+esc(text)+'</div><div class="msg-time">'+now+'</div></div><div class="msg-av user-av">U</div>';
  msgs.appendChild(row); msgs.scrollTop=msgs.scrollHeight; _save('user',text);
}
function _renderUser(text) {
  var row=document.createElement('div'); row.className='msg-row user';
  row.innerHTML='<div><div class="msg-bubble">'+esc(text)+'</div></div><div class="msg-av user-av">U</div>';
  document.getElementById('messages').appendChild(row);
}

function showTyping() {
  isTyping=true; document.getElementById('send-btn').disabled=true;
  var msgs=document.getElementById('messages');
  var row=document.createElement('div'); row.className='msg-row bot'; row.id='typing-row';
  row.innerHTML='<div class="msg-av"><img src="'+AVATAR+'" onload="this.style.display=\\'block\\'" onerror="this.style.display=\\'none\\'" alt="S"><span style="font-size:11px;font-weight:600;color:#fff">S</span></div><div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
  msgs.appendChild(row); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){var r=document.getElementById('typing-row');if(r)r.remove();}

function setChips(labels){
  var row=document.getElementById('chip-row'); row.innerHTML='';
  labels.forEach(function(l){
    var b=document.createElement('button'); b.className='chip'; b.textContent=l;
    b.onclick=function(){sendChip(l);}; row.appendChild(b);
  });
}
function clearChips(){document.getElementById('chip-row').innerHTML='';}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(text){
  return esc(text)
    .replace(/\\n/g,'<br>')
    .replace(/\\*\\*(.*?)\\*\\*/g,'<strong>$1</strong>')
    .replace(/\\[([^\\]]+)\\]\\((https?:\\/\\/[^)]+)\\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
    .replace(/(^|<br>|\\s)(https?:\\/\\/[^\\s<"]+)/g,'$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
}
</script>
</body>
</html>
